<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Measurement Tool</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex: 1;
    min-height: 0;
    border: 1px solid #333;
    border-radius: 10px;
    margin: 10px;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 200px;
    min-width: 200px;
    background: #242424;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    padding: 14px 12px;
    gap: 14px;
    overflow-y: auto;
  }

  .slbl {
    font-size: 10px;
    letter-spacing: .1em;
    color: #666;
    margin-bottom: 5px;
  }

  button {
    background: transparent;
    border: 0.5px solid #444;
    border-radius: 6px;
    color: #d0d0d0;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    padding: 7px 10px;
    transition: background .15s, border-color .15s;
  }
  button:hover:not(:disabled) { background: #2e2e2e; border-color: #666; }
  button:active:not(:disabled) { transform: scale(0.98); }
  button:disabled { opacity: .4; cursor: default; }

  #scaleStatus {
    font-size: 11px;
    font-family: monospace;
    color: #666;
    margin-bottom: 6px;
    padding: 5px 8px;
    background: #1e1e1e;
    border-radius: 6px;
    border: 0.5px solid #333;
  }

  /* ── Canvas area ── */
  #canvasArea {
    flex: 1;
    position: relative;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #dz {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    pointer-events: none;
    color: #555;
    font-size: 13px;
  }
  #dz span { font-size: 12px; color: #444; }

  #cv {
    display: none;
    max-width: 100%;
    max-height: 100%;
    cursor: default;
  }

  #hint {
    display: none;
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, .75);
    color: #fff;
    font-size: 12px;
    padding: 5px 18px;
    border-radius: 100px;
    white-space: nowrap;
    z-index: 5;
    pointer-events: none;
  }

  /* ── Results list ── */
  #resList { display: flex; flex-direction: column; gap: 4px; }
  #noRes { font-size: 12px; color: #555; }

  .res-item {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 8px;
    background: #1e1e1e;
    border-radius: 6px;
    border: 0.5px solid #333;
    font-size: 11px;
    cursor: default;
    transition: background .1s, border-color .1s;
  }
  .res-item:hover { background: rgba(239,159,39,.07); border-color: #EF9F27; }
  .res-item .num  { color: #EF9F27; font-weight: 500; min-width: 18px; }
  .res-item .val  { font-family: monospace; color: #e0e0e0; flex: 1; }
  .res-item .px   { color: #555; font-size: 10px; }
  .res-item .del  { cursor: pointer; color: #555; padding: 0 3px; font-size: 14px; line-height: 1; }
  .res-item .del:hover { color: #e24b4b; }

  /* ── Scale modal ── */
  #scaleModal {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 30;
    justify-content: center;
    align-items: center;
  }

  .modal-box {
    background: #242424;
    border: 0.5px solid #444;
    border-radius: 10px;
    padding: 20px;
    width: 260px;
  }
  .modal-box h3 { font-size: 14px; font-weight: 500; color: #e0e0e0; margin-bottom: 4px; }
  .modal-box p  { font-size: 12px; color: #888; margin-bottom: 12px; }

  .modal-inputs { display: flex; gap: 6px; margin-bottom: 14px; }

  input[type="number"],
  input[type="text"] {
    background: #1a1a1a;
    border: 0.5px solid #444;
    border-radius: 6px;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: #888; }
  input[type="number"] { flex: 1; min-width: 0; }
  input[type="text"]   { width: 56px; text-align: center; }

  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }

  .btn-confirm {
    background: #0F6E56;
    border-color: #0F6E56;
    color: #fff;
    font-size: 12px;
    padding: 6px 14px;
  }
  .btn-confirm:hover { background: #0a5240; }

  .btn-scale-active  { background: #0F6E56 !important; border-color: #0F6E56 !important; color: #fff !important; }
  .btn-meas-active   { background: #854F0B !important; border-color: #854F0B !important; color: #fff !important; }
  .btn-diam-active   { background: #0F5E6E !important; border-color: #0F5E6E !important; color: #fff !important; }
  .btn-angle-active  { background: #7B2D5A !important; border-color: #7B2D5A !important; color: #fff !important; }
  .btn-clear-style   { color: #e24b4b; }
  .btn-row { display: flex; gap: 6px; }
  .btn-row button { flex: 1; padding: 7px 4px; }

  #loadLabel {
    display: block;
    background: #1e1e1e;
    border: 0.5px solid #444;
    border-radius: 6px;
    padding: 7px 0;
    text-align: center;
    font-size: 13px;
    color: #d0d0d0;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  #loadLabel:hover { background: #2a2a2a; border-color: #666; }
</style>
</head>
<body>

<div id="app">

  <!-- ── Sidebar ── -->
  <div id="sidebar">

    <div>
      <label id="loadLabel">
        Load image
        <input type="file" id="fileInput" accept="image/*" style="display:none">
      </label>
    </div>

    <div>
      <div class="slbl">SCALE</div>
      <div id="scaleStatus">Not set</div>
      <button id="btnScale" onclick="doScale()" disabled>Set scale line</button>
    </div>

    <div>
      <div class="slbl">MEASURE</div>
      <button id="btnMeasure" onclick="doMeasure()" disabled>Add measurement</button>
      <div class="btn-row" style="margin-top:6px">
        <button id="btnDiam"  onclick="doDiam()"  disabled>⌀ Diameter</button>
        <button id="btnAngle" onclick="doAngle()" disabled>∠ Angle</button>
      </div>
    </div>

    <div style="flex:1;min-height:0;overflow-y:auto">
      <div class="slbl">RESULTS</div>
      <div id="resList"></div>
      <div id="noRes">No measurements yet</div>
    </div>

    <button id="btnClear" class="btn-clear-style" onclick="clearAll()" disabled>Clear all</button>
    <div class="btn-row">
      <button id="btnExport"    onclick="exportImg()" disabled>Export PNG</button>
      <button id="btnExportCSV" onclick="exportCSV()" disabled>Export CSV</button>
    </div>

  </div>

  <!-- ── Canvas area ── -->
  <div id="canvasArea">

    <div id="dz">
      <svg width="48" height="48" viewBox="0 0 44 44" fill="none">
        <circle cx="22" cy="22" r="21" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="4 3"/>
        <path d="M22 13v11M16 19l6-6 6 6M13 30h18"
              stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Drop image here
      <span>or use the Load button</span>
    </div>

    <canvas id="cv"></canvas>

    <div id="hint"></div>

    <!-- Scale value modal -->
    <div id="scaleModal">
      <div class="modal-box">
        <h3>Define scale</h3>
        <p>The line you drew represents:</p>
        <div class="modal-inputs">
          <input type="number" id="sVal" placeholder="e.g. 100" min="0.001" step="any">
          <input type="text"   id="sUnit" value="mm">
        </div>
        <div class="modal-footer">
          <button onclick="cancelScale()">Cancel</button>
          <button class="btn-confirm" onclick="confirmScale()">Set scale</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ─── State ─────────────────────────────────────────────────────────────── */
const cv     = document.getElementById('cv');
const ctx    = cv.getContext('2d');
const ca     = document.getElementById('canvasArea');
const btnScale   = document.getElementById('btnScale');
const btnMeasure = document.getElementById('btnMeasure');
const btnDiam    = document.getElementById('btnDiam');
const btnAngle   = document.getElementById('btnAngle');
const btnClear      = document.getElementById('btnClear');
const btnExport     = document.getElementById('btnExport');
const btnExportCSV  = document.getElementById('btnExportCSV');
const scaleStatus = document.getElementById('scaleStatus');
const resList = document.getElementById('resList');
const noRes   = document.getElementById('noRes');
const hint    = document.getElementById('hint');
const modal   = document.getElementById('scaleModal');

let img       = null;   // loaded HTMLImageElement
let mode      = 'idle'; // idle | sa | sb | wait | ma | mb | da | db | aa | ab | ac
let p0        = null;   // first click point
let p1        = null;   // second click point (used for angle vertex)
let mp        = null;   // live mouse position while drawing

let scLine    = null;   // drawn scale line {x1,y1,x2,y2}
let scPx      = null;   // pixel length of scale line
let scFactor  = null;   // real_unit / pixel
let scUnit    = 'mm';

let meas      = [];     // [{x1,y1,x2,y2,px}]
let pLine     = null;   // pending scale line, before user confirms value
let hovIdx    = -1;     // highlighted measurement index

/* ─── File loading ───────────────────────────────────────────────────────── */
document.getElementById('fileInput').onchange = e => {
  if (e.target.files[0]) { loadImg(e.target.files[0]); e.target.value = ''; }
};

ca.addEventListener('dragover', e => {
  e.preventDefault();
  ca.style.outline = '2px solid #1D9E75';
});
ca.addEventListener('dragleave', () => { ca.style.outline = ''; });
ca.addEventListener('drop', e => {
  e.preventDefault();
  ca.style.outline = '';
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImg(f);
});

function loadImg(file) {
  const r = new FileReader();
  r.onload = ev => {
    const i = new Image();
    i.onload = () => {
      img = i;
      scLine = null; scPx = null; scFactor = null;
      meas = []; mode = 'idle'; p0 = null;
      fitImg();
      document.getElementById('dz').style.display = 'none';
      updUI();
    };
    i.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

function fitImg() {
  const aw = ca.clientWidth  - 20;
  const ah = ca.clientHeight - 20;
  const r  = Math.min(aw / img.width, ah / img.height, 1);
  cv.width  = Math.round(img.width  * r);
  cv.height = Math.round(img.height * r);
  cv.style.display = 'block';
  draw();
}

/* ─── Coordinate helpers ─────────────────────────────────────────────────── */
function pt(e) {
  const rc = cv.getBoundingClientRect();
  return {
    x: (e.clientX - rc.left) * cv.width  / rc.width,
    y: (e.clientY - rc.top)  * cv.height / rc.height
  };
}

function dst(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }

/* ─── Canvas interaction ─────────────────────────────────────────────────── */
cv.addEventListener('click', e => {
  if (!img || mode === 'idle' || mode === 'wait') return;
  const p = pt(e);

  if (mode === 'sa') {
    p0 = p; mode = 'sb';
    setHint('Click to place end point — Esc to cancel');

  } else if (mode === 'sb') {
    if (dst(p0, p) < 5) return;
    pLine = { x1: p0.x, y1: p0.y, x2: p.x, y2: p.y };
    mode = 'wait'; p0 = null; mp = null;
    draw(); showModal();

  } else if (mode === 'ma') {
    p0 = p; mode = 'mb';
    setHint('Click to place end point — Esc to cancel');

  } else if (mode === 'mb') {
    if (dst(p0, p) < 5) return;
    meas.push({ type:'line', x1: p0.x, y1: p0.y, x2: p.x, y2: p.y, px: dst(p0, p) });
    p0 = null; mp = null; mode = 'ma';
    setHint('Click to start next measurement — Esc to stop');
    draw(); updUI();

  } else if (mode === 'da') {
    p0 = p; mode = 'db';
    setHint('Click second point of diameter — Esc to cancel');

  } else if (mode === 'db') {
    if (dst(p0, p) < 5) return;
    const r = dst(p0, p) / 2;
    const cx = (p0.x + p.x) / 2, cy = (p0.y + p.y) / 2;
    meas.push({ type:'diam', cx, cy, r, x1:p0.x, y1:p0.y, x2:p.x, y2:p.y });
    p0 = null; mp = null; mode = 'da';
    setHint('Click to start next diameter — Esc to stop');
    draw(); updUI();

  } else if (mode === 'aa') {
    p0 = p; mode = 'ab';
    setHint('Click vertex (angle point) — Esc to cancel');

  } else if (mode === 'ab') {
    if (dst(p0, p) < 5) return;
    p1 = p; mode = 'ac';
    setHint('Click second arm point — Esc to cancel');

  } else if (mode === 'ac') {
    if (dst(p1, p) < 5) return;
    const deg = angleDeg(p0, p1, p);
    meas.push({ type:'angle', ax:p0.x, ay:p0.y, vx:p1.x, vy:p1.y, bx:p.x, by:p.y, deg });
    p0 = null; p1 = null; mp = null; mode = 'aa';
    setHint('Click to start next angle — Esc to stop');
    draw(); updUI();
  }
});

cv.addEventListener('mousemove', e => {
  if (mode === 'sa' || mode === 'sb' || mode === 'ma' || mode === 'mb' ||
      mode === 'da' || mode === 'db' || mode === 'aa' || mode === 'ab' || mode === 'ac') {
    mp = pt(e); draw();
  }
});

cv.addEventListener('mouseleave', () => {
  if (mp) { mp = null; draw(); }
});

/* ─── Keyboard shortcuts ─────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (mode === 'sa' || mode === 'sb' || mode === 'wait') {
    cancelScale();
  } else if (mode === 'ma' || mode === 'mb' ||
             mode === 'da' || mode === 'db' ||
             mode === 'aa' || mode === 'ab' || mode === 'ac') {
    mode = 'idle'; p0 = null; p1 = null; mp = null; clearHint(); draw(); updUI();
  }
});

/* ─── Tool button handlers ───────────────────────────────────────────────── */
function doScale() {
  if (mode === 'sa' || mode === 'sb') {
    mode = 'idle'; p0 = null; mp = null; clearHint(); draw(); updUI(); return;
  }
  mode = 'sa'; p0 = null;
  setHint('Click to place start point of the scale line');
  updUI();
}

function doMeasure() {
  if (mode === 'ma' || mode === 'mb') {
    mode = 'idle'; p0 = null; mp = null; clearHint(); draw(); updUI(); return;
  }
  if (!scFactor) return;
  mode = 'ma'; p0 = null;
  setHint('Click to start a measurement');
  updUI();
}

function doDiam() {
  if (mode === 'da' || mode === 'db') {
    mode = 'idle'; p0 = null; mp = null; clearHint(); draw(); updUI(); return;
  }
  if (!scFactor) return;
  mode = 'da'; p0 = null;
  setHint('Click first point of diameter — Esc to cancel');
  updUI();
}

function doAngle() {
  if (mode === 'aa' || mode === 'ab' || mode === 'ac') {
    mode = 'idle'; p0 = null; p1 = null; mp = null; clearHint(); draw(); updUI(); return;
  }
  if (!scFactor) return;
  mode = 'aa'; p0 = null; p1 = null;
  setHint('Click first arm point — Esc to cancel');
  updUI();
}

function angleDeg(a, v, b) {
  const ax = a.x - v.x, ay = a.y - v.y;
  const bx = b.x - v.x, by = b.y - v.y;
  const dot = ax * bx + ay * by;
  const mag = Math.hypot(ax, ay) * Math.hypot(bx, by);
  return Math.acos(Math.max(-1, Math.min(1, dot / mag))) * 180 / Math.PI;
}

function clearAll() {
  meas = []; scLine = null; scPx = null; scFactor = null;
  mode = 'idle'; p0 = null; mp = null;
  clearHint(); draw(); updUI();
}

/* ─── Modal ──────────────────────────────────────────────────────────────── */
function showModal() {
  modal.style.display = 'flex';
  const sv = document.getElementById('sVal');
  sv.value = ''; sv.style.borderColor = ''; sv.focus();
}

function cancelScale() {
  modal.style.display = 'none';
  pLine = null; mode = 'idle'; clearHint(); draw(); updUI();
}

function confirmScale() {
  const sv  = document.getElementById('sVal');
  const val = parseFloat(sv.value);
  if (!val || val <= 0) { sv.style.borderColor = '#E24B4A'; sv.focus(); return; }
  sv.style.borderColor = '';

  scUnit   = document.getElementById('sUnit').value.trim() || 'mm';
  scLine   = pLine;
  scPx     = Math.hypot(scLine.x2 - scLine.x1, scLine.y2 - scLine.y1);
  scFactor = val / scPx;
  pLine = null; modal.style.display = 'none';
  mode = 'idle'; clearHint(); draw(); updUI();
}

document.getElementById('sVal').addEventListener('keydown', e => {
  if (e.key === 'Enter')  confirmScale();
  if (e.key === 'Escape') cancelScale();
});

/* ─── UI update ──────────────────────────────────────────────────────────── */
function updUI() {
  const hasImg  = !!img;
  const hasSc   = !!scFactor;
  const isSc    = mode === 'sa' || mode === 'sb' || mode === 'wait';
  const isMeas  = mode === 'ma' || mode === 'mb';
  const isDiam  = mode === 'da' || mode === 'db';
  const isAngle = mode === 'aa' || mode === 'ab' || mode === 'ac';

  btnScale.disabled   = !hasImg;
  btnMeasure.disabled = !hasSc;
  btnDiam.disabled    = !hasSc;
  btnAngle.disabled   = !hasSc;
  btnClear.disabled       = !hasImg;
  btnExport.disabled      = !hasImg;
  btnExportCSV.disabled   = !hasImg;

  btnScale.className   = isSc   ? 'btn-scale-active' : '';
  btnScale.textContent = isSc   ? 'Cancel scale drawing'
                       : hasSc  ? 'Reset scale line'
                       :          'Set scale line';

  btnMeasure.className   = isMeas ? 'btn-meas-active' : '';
  btnMeasure.textContent = isMeas ? 'Stop measuring' : 'Add measurement';

  btnDiam.className   = isDiam  ? 'btn-diam-active' : '';
  btnDiam.textContent = isDiam  ? 'Stop' : '⌀ Diameter';

  btnAngle.className   = isAngle ? 'btn-angle-active' : '';
  btnAngle.textContent = isAngle ? 'Stop' : '∠ Angle';

  if (hasSc) {
    scaleStatus.textContent = `${(1 / scFactor).toFixed(2)} px\u202f/\u202f${scUnit}`;
    scaleStatus.style.color = '#1D9E75';
  } else {
    scaleStatus.textContent = 'Not set';
    scaleStatus.style.color = '';
  }

  cv.style.cursor =
    (mode === 'sa' || mode === 'sb' || mode === 'ma' || mode === 'mb' ||
     mode === 'da' || mode === 'db' || mode === 'aa' || mode === 'ab' || mode === 'ac')
    ? 'none' : 'default';

  /* Results list */
  resList.innerHTML = '';
  noRes.style.display = meas.length ? 'none' : 'block';

  meas.forEach((m, i) => {
    let icon, lbl, pxInfo;
    if (m.type === 'line') {
      const real = scFactor ? m.px * scFactor : null;
      icon    = '↔';
      lbl     = real !== null ? `${real.toFixed(2)} ${scUnit}` : `${Math.round(m.px)} px`;
      pxInfo  = `${Math.round(m.px)}px`;
    } else if (m.type === 'diam') {
      const real = scFactor ? m.r * 2 * scFactor : null;
      icon    = '⌀';
      lbl     = real !== null ? `${real.toFixed(2)} ${scUnit}` : `${Math.round(m.r * 2)} px`;
      pxInfo  = `${Math.round(m.r * 2)}px`;
    } else if (m.type === 'angle') {
      icon    = '∠';
      lbl     = `${m.deg.toFixed(1)}°`;
      pxInfo  = '';
    }

    const col = m.type === 'diam' ? '#5DCAA5' : m.type === 'angle' ? '#D4537E' : '#EF9F27';

    const d = document.createElement('div');
    d.className = 'res-item';
    d.style.setProperty('--hcol', col);
    d.innerHTML =
      `<span class="num" style="color:${col}">${icon}${i + 1}</span>` +
      `<span class="val">${lbl}</span>` +
      `<span class="px">${pxInfo}</span>` +
      `<span class="del" title="Delete" onclick="delM(${i})">&times;</span>`;
    d.addEventListener('mouseenter', () => { hovIdx = i; draw(); });
    d.addEventListener('mouseleave', () => { hovIdx = -1; draw(); });
    resList.appendChild(d);
  });
}

function delM(i) {
  meas.splice(i, 1);
  if (hovIdx >= meas.length) hovIdx = -1;
  draw(); updUI();
}

/* ─── Drawing ────────────────────────────────────────────────────────────── */
function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  if (!img) return;
  ctx.drawImage(img, 0, 0, cv.width, cv.height);

  /* Confirmed scale line */
  if (scLine) ann(scLine.x1, scLine.y1, scLine.x2, scLine.y2, '#1D9E75', 'scale', false);

  /* Pending scale line (drawn but not confirmed) */
  if (pLine) ann(pLine.x1, pLine.y1, pLine.x2, pLine.y2, '#1D9E75', null, false);

  /* All measurements */
  meas.forEach((m, i) => {
    const hi = hovIdx === i;
    if (m.type === 'line') {
      const real = scFactor ? m.px * scFactor : null;
      const lbl  = real !== null ? `#${i+1}  ${real.toFixed(2)} ${scUnit}` : `#${i+1}  ${Math.round(m.px)}px`;
      ann(m.x1, m.y1, m.x2, m.y2, '#EF9F27', lbl, hi);
    } else if (m.type === 'diam') {
      const real = scFactor ? m.r * 2 * scFactor : null;
      const lbl  = real !== null ? `⌀${i+1}  ${real.toFixed(2)} ${scUnit}` : `⌀${i+1}  ${Math.round(m.r*2)}px`;
      annDiam(m.cx, m.cy, m.r, m.x1, m.y1, m.x2, m.y2, '#5DCAA5', lbl, hi);
    } else if (m.type === 'angle') {
      annAngle(m.ax, m.ay, m.vx, m.vy, m.bx, m.by, m.deg, `∠${i+1}  ${m.deg.toFixed(1)}°`, hi);
    }
  });

  /* Live rubber-band previews */
  if (p0 && mp) {
    if (mode === 'sb') {
      /* scale line preview */
      rubberLine(p0, mp, '#1D9E75', null);
    } else if (mode === 'mb') {
      /* distance line preview */
      const d = dst(p0, mp);
      const txt = scFactor ? `${(d * scFactor).toFixed(2)} ${scUnit}` : `${Math.round(d)} px`;
      rubberLine(p0, mp, '#EF9F27', txt);
    } else if (mode === 'db') {
      /* diameter preview */
      const r = dst(p0, mp) / 2;
      const cx = (p0.x + mp.x) / 2, cy = (p0.y + mp.y) / 2;
      const real = scFactor ? r * 2 * scFactor : null;
      const txt = real !== null ? `⌀ ${real.toFixed(2)} ${scUnit}` : `⌀ ${Math.round(r*2)} px`;
      ctx.save();
      ctx.strokeStyle = '#5DCAA5'; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.75;
      ctx.setLineDash([5,4]);
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      /* diameter axis */
      ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(mp.x, mp.y); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#5DCAA5';
      ctx.beginPath(); ctx.arc(p0.x, p0.y, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(mp.x, mp.y, 3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      drawLabel(cx, cy - r - 10, txt, '#5DCAA5');
    } else if (mode === 'ab') {
      /* angle: showing first arm, waiting for vertex */
      rubberLine(p0, mp, '#D4537E', null);
    } else if (mode === 'ac' && p1) {
      /* angle: both arms live */
      const deg = angleDeg(p0, p1, mp);
      ctx.save();
      ctx.strokeStyle = '#D4537E'; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.8;
      ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(mp.x, mp.y); ctx.stroke();
      /* arc */
      const a1 = Math.atan2(p0.y - p1.y, p0.x - p1.x);
      const a2 = Math.atan2(mp.y - p1.y, mp.x - p1.x);
      const arcR = Math.min(dst(p0,p1), dst(p1,mp)) * 0.3;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.arc(p1.x, p1.y, arcR, a1, a2); ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha = 1;
      ctx.fillStyle = '#D4537E';
      for (const pp of [p0, p1, mp]) { ctx.beginPath(); ctx.arc(pp.x, pp.y, 3, 0, Math.PI*2); ctx.fill(); }
      ctx.restore();
      const midA = (a1 + a2) / 2;
      drawLabel(p1.x + Math.cos(midA) * (arcR + 20), p1.y + Math.sin(midA) * (arcR + 20),
                `${deg.toFixed(1)}°`, '#D4537E');
    }
  }

  /* If in angle mode ac, always draw the first arm from p0 to p1 */
  if (mode === 'ac' && p0 && p1 && !mp) {
    ctx.save();
    ctx.strokeStyle = '#D4537E'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.stroke();
    ctx.fillStyle = '#D4537E';
    ctx.beginPath(); ctx.arc(p0.x, p0.y, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(p1.x, p1.y, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  /* Magnifier lens — shown whenever cursor is over canvas in an active mode */
  if (mp) {
    const col = (mode === 'sa' || mode === 'sb') ? '#1D9E75'
              : (mode === 'da' || mode === 'db') ? '#5DCAA5'
              : (mode === 'aa' || mode === 'ab' || mode === 'ac') ? '#D4537E'
              : '#EF9F27';
    drawMagnifier(mp.x, mp.y, col);
  }
}

/* Simple rubber-band dashed line with optional label */
function rubberLine(a, b, col, label) {
  ctx.save();
  ctx.strokeStyle = col; ctx.lineWidth = 1.5;
  ctx.setLineDash([5,4]); ctx.globalAlpha = 0.8;
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha = 1;
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(a.x, a.y, 4, 0, Math.PI*2); ctx.fill();
  if (label) drawLabel((a.x+b.x)/2, (a.y+b.y)/2 - 10, label, col);
  ctx.restore();
}

/* Diameter annotation: circle + axis line */
function annDiam(cx, cy, r, x1, y1, x2, y2, col, label, highlight) {
  ctx.save();
  ctx.strokeStyle = col;
  ctx.lineWidth   = highlight ? 2.5 : 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  /* axis */
  ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.setLineDash([]);
  /* endpoint dots */
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(x1,y1,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x2,y2,4,0,Math.PI*2); ctx.fill();
  /* center cross */
  const cs = 5;
  ctx.beginPath(); ctx.moveTo(cx-cs,cy); ctx.lineTo(cx+cs,cy);
  ctx.moveTo(cx,cy-cs); ctx.lineTo(cx,cy+cs); ctx.stroke();
  if (label) drawLabel(cx, cy - r - 10, label, col);
  ctx.restore();
}

/* Angle annotation: two arms + arc */
function annAngle(ax, ay, vx, vy, bx, by, deg, label, highlight) {
  ctx.save();
  const col = '#D4537E';
  ctx.strokeStyle = col;
  ctx.lineWidth   = highlight ? 2.5 : 1.5;
  /* arms */
  ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(vx,vy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(vx,vy); ctx.lineTo(bx,by); ctx.stroke();
  /* arc */
  const a1 = Math.atan2(ay-vy, ax-vx);
  const a2 = Math.atan2(by-vy, bx-vx);
  const arcR = Math.min(Math.hypot(ax-vx,ay-vy), Math.hypot(bx-vx,by-vy)) * 0.3;
  ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.arc(vx, vy, arcR, a1, a2); ctx.stroke();
  ctx.setLineDash([]);
  /* dots */
  ctx.fillStyle = col;
  for (const [px,py] of [[ax,ay],[vx,vy],[bx,by]]) {
    ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fill();
  }
  /* label at arc midpoint */
  const midA = (a1 + a2) / 2;
  if (label) drawLabel(vx + Math.cos(midA)*(arcR+20), vy + Math.sin(midA)*(arcR+20), label, col);
  ctx.restore();
}

/* Annotated line with tick marks and label */
function ann(x1, y1, x2, y2, col, label, highlight) {
  ctx.save();
  ctx.strokeStyle = col;
  ctx.lineWidth   = highlight ? 2.5 : 1.5;

  /* Main line */
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  /* Tick marks at each end */
  const angle = Math.atan2(y2 - y1, x2 - x1) + Math.PI / 2;
  const tick  = 6;
  for (const [px, py] of [[x1, y1], [x2, y2]]) {
    ctx.beginPath();
    ctx.moveTo(px + Math.cos(angle) * tick, py + Math.sin(angle) * tick);
    ctx.lineTo(px - Math.cos(angle) * tick, py - Math.sin(angle) * tick);
    ctx.stroke();
  }

  /* Endpoint dots */
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(x1, y1, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x2, y2, 4, 0, Math.PI * 2); ctx.fill();

  if (label) drawLabel((x1 + x2) / 2, (y1 + y2) / 2 - 10, label, col);
  ctx.restore();
}

/* Pill-shaped label with dark background */
function drawLabel(x, y, text, col) {
  ctx.save();
  ctx.font = 'bold 11px monospace';
  const tw = ctx.measureText(text).width;
  const p  = 5, h = 17, r = 4;
  const rx = x - tw / 2 - p;
  const ry = y - h / 2;

  ctx.fillStyle = 'rgba(0,0,0,.8)';
  ctx.beginPath();
  ctx.moveTo(rx + r, ry);
  ctx.lineTo(rx + tw + p * 2 - r, ry);
  ctx.arcTo(rx + tw + p * 2, ry, rx + tw + p * 2, ry + r, r);
  ctx.lineTo(rx + tw + p * 2, ry + h - r);
  ctx.arcTo(rx + tw + p * 2, ry + h, rx + tw + p * 2 - r, ry + h, r);
  ctx.lineTo(rx + r, ry + h);
  ctx.arcTo(rx, ry + h, rx, ry + h - r, r);
  ctx.lineTo(rx, ry + r);
  ctx.arcTo(rx, ry, rx + r, ry, r);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle    = col;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
  ctx.restore();
}

function exportImg() {
  if (!img) return;
  /* Render at full original image resolution */
  const ec  = document.createElement('canvas');
  ec.width  = img.width;
  ec.height = img.height;
  const ec_ctx = ec.getContext('2d');

  /* Scale factor from canvas display size → original image size */
  const sx = img.width  / cv.width;
  const sy = img.height / cv.height;

  ec_ctx.drawImage(img, 0, 0);

  /* Redraw all annotations scaled up */
  const savedCtx = ctx;
  /* Temporarily redirect drawing to export canvas */
  const _cv  = { width: img.width, height: img.height };
  const _ctx = ec_ctx;

  function scPt(x, y) { return [x * sx, y * sy]; }

  /* Scale line */
  if (scLine) {
    const [x1,y1] = scPt(scLine.x1, scLine.y1);
    const [x2,y2] = scPt(scLine.x2, scLine.y2);
    drawAnnOn(ec_ctx, x1,y1,x2,y2, '#1D9E75', 'scale', false, sx);
  }

  meas.forEach((m, i) => {
    if (m.type === 'line') {
      const real = scFactor ? m.px * scFactor : null;
      const lbl  = real !== null ? `#${i+1}  ${real.toFixed(2)} ${scUnit}` : `#${i+1}  ${Math.round(m.px)}px`;
      const [x1,y1] = scPt(m.x1,m.y1), [x2,y2] = scPt(m.x2,m.y2);
      drawAnnOn(ec_ctx, x1,y1,x2,y2, '#EF9F27', lbl, false, sx);
    } else if (m.type === 'diam') {
      const real = scFactor ? m.r*2*scFactor : null;
      const lbl  = real !== null ? `⌀${i+1}  ${real.toFixed(2)} ${scUnit}` : `⌀${i+1}  ${Math.round(m.r*2)}px`;
      const [cx,cy] = scPt(m.cx,m.cy), r = m.r * sx;
      const [x1,y1] = scPt(m.x1,m.y1), [x2,y2] = scPt(m.x2,m.y2);
      drawDiamOn(ec_ctx, cx,cy,r,x1,y1,x2,y2, '#5DCAA5', lbl, sx);
    } else if (m.type === 'angle') {
      const [ax,ay] = scPt(m.ax,m.ay), [vx,vy] = scPt(m.vx,m.vy), [bx,by] = scPt(m.bx,m.by);
      drawAngleOn(ec_ctx, ax,ay,vx,vy,bx,by, m.deg, `∠${i+1}  ${m.deg.toFixed(1)}°`, sx);
    }
  });

  const a = document.createElement('a');
  a.download = 'mesuro-export.png';
  a.href = ec.toDataURL('image/png');
  a.click();
}

function exportCSV() {
  if (!meas.length) return;

  const rows = [
    ['#', 'type', 'value', 'unit', 'px_length', 'x1', 'y1', 'x2', 'y2', 'cx', 'cy', 'radius_px', 'vertex_x', 'vertex_y', 'arm1_x', 'arm1_y', 'arm2_x', 'arm2_y']
  ];

  const ir  = img.width  / cv.width;
  const ir2 = img.height / cv.height;

  meas.forEach((m, i) => {
    const n = i + 1;
    if (m.type === 'line') {
      const real = scFactor ? (m.px * scFactor).toFixed(4) : '';
      rows.push([n, 'length', real, scUnit,
        m.px.toFixed(2),
        Math.round(m.x1 * ir), Math.round(m.y1 * ir2),
        Math.round(m.x2 * ir), Math.round(m.y2 * ir2),
        '', '', '', '', '', '', '', '', '']);
    } else if (m.type === 'diam') {
      const real = scFactor ? (m.r * 2 * scFactor).toFixed(4) : '';
      rows.push([n, 'diameter', real, scUnit,
        (m.r * 2).toFixed(2),
        Math.round(m.x1 * ir), Math.round(m.y1 * ir2),
        Math.round(m.x2 * ir), Math.round(m.y2 * ir2),
        Math.round(m.cx * ir), Math.round(m.cy * ir2),
        (m.r * ir).toFixed(2),
        '', '', '', '', '', '']);
    } else if (m.type === 'angle') {
      rows.push([n, 'angle', m.deg.toFixed(4), 'deg',
        '',
        '', '', '', '', '', '', '',
        Math.round(m.vx * ir), Math.round(m.vy * ir2),
        Math.round(m.ax * ir), Math.round(m.ay * ir2),
        Math.round(m.bx * ir), Math.round(m.by * ir2)]);
    }
  });

  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.download = 'mesuro-measurements.csv';
  a.href = URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
}
function drawLabelOn(ec, x, y, text, col, s) {
  ec.save();
  const fs = Math.max(11, 11 * s);
  ec.font = `bold ${fs}px monospace`;
  const tw = ec.measureText(text).width;
  const p = 5*s, h = 17*s, r = 4*s;
  const rx = x - tw/2 - p, ry = y - h/2;
  ec.fillStyle = 'rgba(0,0,0,.8)';
  ec.beginPath();
  ec.moveTo(rx+r,ry); ec.lineTo(rx+tw+p*2-r,ry);
  ec.arcTo(rx+tw+p*2,ry,rx+tw+p*2,ry+r,r);
  ec.lineTo(rx+tw+p*2,ry+h-r);
  ec.arcTo(rx+tw+p*2,ry+h,rx+tw+p*2-r,ry+h,r);
  ec.lineTo(rx+r,ry+h); ec.arcTo(rx,ry+h,rx,ry+h-r,r);
  ec.lineTo(rx,ry+r);   ec.arcTo(rx,ry,rx+r,ry,r);
  ec.closePath(); ec.fill();
  ec.fillStyle = col; ec.textAlign = 'center'; ec.textBaseline = 'middle';
  ec.fillText(text, x, y);
  ec.restore();
}

function drawAnnOn(ec, x1,y1,x2,y2, col, label, hi, s) {
  ec.save();
  ec.strokeStyle = col; ec.lineWidth = 2*s;
  ec.beginPath(); ec.moveTo(x1,y1); ec.lineTo(x2,y2); ec.stroke();
  const angle = Math.atan2(y2-y1,x2-x1) + Math.PI/2, tick = 6*s;
  for (const [px,py] of [[x1,y1],[x2,y2]]) {
    ec.beginPath();
    ec.moveTo(px+Math.cos(angle)*tick, py+Math.sin(angle)*tick);
    ec.lineTo(px-Math.cos(angle)*tick, py-Math.sin(angle)*tick);
    ec.stroke();
  }
  ec.fillStyle = col;
  ec.beginPath(); ec.arc(x1,y1,4*s,0,Math.PI*2); ec.fill();
  ec.beginPath(); ec.arc(x2,y2,4*s,0,Math.PI*2); ec.fill();
  if (label) drawLabelOn(ec,(x1+x2)/2,(y1+y2)/2-10*s,label,col,s);
  ec.restore();
}

function drawDiamOn(ec, cx,cy,r,x1,y1,x2,y2, col, label, s) {
  ec.save();
  ec.strokeStyle = col; ec.lineWidth = 2*s;
  ec.beginPath(); ec.arc(cx,cy,r,0,Math.PI*2); ec.stroke();
  ec.setLineDash([4*s,3*s]);
  ec.beginPath(); ec.moveTo(x1,y1); ec.lineTo(x2,y2); ec.stroke();
  ec.setLineDash([]);
  ec.fillStyle = col;
  ec.beginPath(); ec.arc(x1,y1,4*s,0,Math.PI*2); ec.fill();
  ec.beginPath(); ec.arc(x2,y2,4*s,0,Math.PI*2); ec.fill();
  const cs = 5*s;
  ec.beginPath(); ec.moveTo(cx-cs,cy); ec.lineTo(cx+cs,cy);
  ec.moveTo(cx,cy-cs); ec.lineTo(cx,cy+cs); ec.stroke();
  if (label) drawLabelOn(ec,cx,cy-r-10*s,label,col,s);
  ec.restore();
}

function drawAngleOn(ec, ax,ay,vx,vy,bx,by, deg, label, s) {
  ec.save();
  const col = '#D4537E';
  ec.strokeStyle = col; ec.lineWidth = 2*s;
  ec.beginPath(); ec.moveTo(ax,ay); ec.lineTo(vx,vy); ec.stroke();
  ec.beginPath(); ec.moveTo(vx,vy); ec.lineTo(bx,by); ec.stroke();
  const a1 = Math.atan2(ay-vy,ax-vx), a2 = Math.atan2(by-vy,bx-vx);
  const arcR = Math.min(Math.hypot(ax-vx,ay-vy), Math.hypot(bx-vx,by-vy)) * 0.3;
  ec.setLineDash([3*s,3*s]);
  ec.beginPath(); ec.arc(vx,vy,arcR,a1,a2); ec.stroke();
  ec.setLineDash([]);
  ec.fillStyle = col;
  for (const [px,py] of [[ax,ay],[vx,vy],[bx,by]]) {
    ec.beginPath(); ec.arc(px,py,4*s,0,Math.PI*2); ec.fill();
  }
  const midA = (a1+a2)/2;
  if (label) drawLabelOn(ec,vx+Math.cos(midA)*(arcR+20*s),vy+Math.sin(midA)*(arcR+20*s),label,col,s);
  ec.restore();
}
/* ─── Magnifier lens ─────────────────────────────────────────────────────── */
function drawMagnifier(cx, cy, col) {
  const MAG_R   = 72;              // lens radius in canvas px
  const ZOOM    = 5;               // zoom factor
  const SRC_H   = MAG_R / ZOOM;   // half-size of source window in canvas px
  const OFFSET  = MAG_R + 18;     // distance from cursor to lens centre

  /* Pick a quadrant so the lens stays inside the canvas */
  const flipX = cx + OFFSET + MAG_R > cv.width;
  const flipY = cy - OFFSET - MAG_R < 0;
  const mx = cx + (flipX ? -OFFSET : OFFSET);
  const my = cy + (flipY ?  OFFSET : -OFFSET);

  /* ── 1. Clip to circle, draw zoomed image ── */
  ctx.save();
  ctx.beginPath();
  ctx.arc(mx, my, MAG_R, 0, Math.PI * 2);
  ctx.clip();

  /* Map from canvas coords → original image coords */
  const ir   = img.width  / cv.width;   /* image px per canvas px */
  const ir2  = img.height / cv.height;
  const srcX = (cx - SRC_H) * ir;
  const srcY = (cy - SRC_H) * ir2;
  const srcW = SRC_H * 2   * ir;
  const srcH = SRC_H * 2   * ir2;

  /* Dark fill behind (handles source region going OOB) */
  ctx.fillStyle = '#111';
  ctx.fillRect(mx - MAG_R, my - MAG_R, MAG_R * 2, MAG_R * 2);

  ctx.imageSmoothingEnabled = false;   /* crisp pixel edges */
  ctx.drawImage(img, srcX, srcY, srcW, srcH,
                mx - MAG_R, my - MAG_R, MAG_R * 2, MAG_R * 2);
  ctx.imageSmoothingEnabled = true;

  ctx.restore();

  /* ── 2. Lens border ── */
  ctx.save();
  ctx.beginPath();
  ctx.arc(mx, my, MAG_R, 0, Math.PI * 2);
  ctx.strokeStyle = col;
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  /* Thin dark outline for contrast on bright images */
  ctx.beginPath();
  ctx.arc(mx, my, MAG_R + 1, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,.5)';
  ctx.lineWidth   = 1;
  ctx.stroke();

  /* ── 3. Crosshair ── */
  const ARM = MAG_R - 4;   /* full arm length */
  const GAP = 5;            /* gap around centre point */

  ctx.strokeStyle = 'rgba(0,0,0,.55)';
  ctx.lineWidth   = 3;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  /* horizontal */
  ctx.moveTo(mx - ARM, my); ctx.lineTo(mx - GAP, my);
  ctx.moveTo(mx + GAP, my); ctx.lineTo(mx + ARM, my);
  /* vertical */
  ctx.moveTo(mx, my - ARM); ctx.lineTo(mx, my - GAP);
  ctx.moveTo(mx, my + GAP); ctx.lineTo(mx, my + ARM);
  ctx.stroke();

  ctx.strokeStyle = col;
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(mx - ARM, my); ctx.lineTo(mx - GAP, my);
  ctx.moveTo(mx + GAP, my); ctx.lineTo(mx + ARM, my);
  ctx.moveTo(mx, my - ARM); ctx.lineTo(mx, my - GAP);
  ctx.moveTo(mx, my + GAP); ctx.lineTo(mx, my + ARM);
  ctx.stroke();

  /* Centre dot */
  ctx.beginPath();
  ctx.arc(mx, my, 2, 0, Math.PI * 2);
  ctx.fillStyle = col;
  ctx.fill();

  /* ── 4. Pixel coordinates label ── */
  const imgPxX = Math.round(cx * ir);
  const imgPxY = Math.round(cy * ir2);
  const coordTxt = `${imgPxX}, ${imgPxY}`;

  ctx.font         = 'bold 10px monospace';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  const tw = ctx.measureText(coordTxt).width;
  const lx = mx, ly = my + MAG_R - 12;

  ctx.fillStyle = 'rgba(0,0,0,.7)';
  ctx.beginPath();
  const pw = tw / 2 + 5, ph = 8, pr = 3;
  ctx.roundRect(lx - pw, ly - ph, pw * 2, ph * 2, pr);
  ctx.fill();

  ctx.fillStyle = col;
  ctx.fillText(coordTxt, lx, ly);

  ctx.restore();

  /* ── 5. Small dot cursor on the main canvas ── */
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,.6)';
  ctx.lineWidth   = 2;
  ctx.stroke();
  ctx.fillStyle   = col;
  ctx.fill();
  ctx.restore();
}

/* ─── Hint bar ───────────────────────────────────────────────────────────── */
