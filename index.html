<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex: 1;
    min-height: 0;
    border: 1px solid #333;
    border-radius: 10px;
    margin: 10px;
    overflow: hidden;
  }

  #sidebar {
    width: 200px;
    min-width: 200px;
    background: #242424;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    padding: 14px 12px;
    gap: 14px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #3a3a3a transparent;
  }

  .slbl {
    font-size: 10px;
    letter-spacing: .1em;
    color: #666;
    margin-bottom: 5px;
  }

  button {
    background: transparent;
    border: 0.5px solid #444;
    border-radius: 6px;
    color: #d0d0d0;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    padding: 7px 10px;
    transition: background .15s, border-color .15s;
    width: 100%;
    text-align: left;
  }
  button:hover:not(:disabled) { background: #2e2e2e; border-color: #666; }
  button:active:not(:disabled) { transform: scale(0.98); }
  button:disabled { opacity: .4; cursor: default; }



  #canvasArea {
    flex: 1;
    position: relative;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }

  #dz {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    pointer-events: none;
    color: #555;
    font-size: 13px;
  }
  #dz span { font-size: 12px; color: #444; }

  #cv { display: none; max-width: 100%; max-height: 100%; cursor: default; }

  #hint {
    display: none;
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,.75);
    color: #fff;
    font-size: 12px;
    padding: 5px 18px;
    border-radius: 100px;
    white-space: nowrap;
    z-index: 5;
    pointer-events: none;
  }

  #toast {
    display: none;
    position: absolute;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(29,158,117,.92);
    color: #fff;
    font-size: 11px;
    padding: 4px 14px;
    border-radius: 100px;
    pointer-events: none;
    z-index: 10;
    white-space: nowrap;
  }

  #resList { display: flex; flex-direction: column; gap: 4px; }
  #noRes { font-size: 12px; color: #555; }

  .res-item {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 8px;
    background: #1e1e1e;
    border-radius: 6px;
    border: 0.5px solid #333;
    font-size: 11px;
    cursor: default;
    transition: background .1s, border-color .1s;
  }
  .res-item .num { font-weight: 500; min-width: 20px; }
  .res-item .val { font-family: monospace; color: #e0e0e0; flex: 1; cursor: pointer; }
  .res-item .val:hover { color: #fff; text-decoration: underline dotted #666; }
  .res-item .px  { color: #555; font-size: 10px; }
  .res-item .del { cursor: pointer; color: #555; padding: 0 3px; font-size: 14px; line-height: 1; }
  .res-item .del:hover { color: #e24b4b; }

  #scaleModal {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 30;
    justify-content: center;
    align-items: center;
  }

  .modal-box {
    background: #242424;
    border: 0.5px solid #444;
    border-radius: 10px;
    padding: 20px;
    width: 260px;
  }
  .modal-box h3 { font-size: 14px; font-weight: 500; color: #e0e0e0; margin-bottom: 4px; }
  .modal-box p  { font-size: 12px; color: #888; margin-bottom: 12px; }
  .modal-inputs { display: flex; gap: 6px; margin-bottom: 14px; }

  input[type="number"], input[type="text"] {
    background: #1a1a1a;
    border: 0.5px solid #444;
    border-radius: 6px;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: #888; }
  input[type="number"] { flex: 1; min-width: 0; }
  input[type="text"]   { width: 56px; text-align: center; }

  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-confirm { background: #0F6E56; border-color: #0F6E56; color: #fff; font-size: 12px; padding: 6px 14px; }
  .btn-confirm:hover { background: #0a5240; }

  .btn-scale-active  { background: #0F6E56 !important; border-color: #0F6E56 !important; color: #fff !important; }
  .btn-meas-active   { background: #854F0B !important; border-color: #854F0B !important; color: #fff !important; }
  .btn-diam-active   { background: #0F5E6E !important; border-color: #0F5E6E !important; color: #fff !important; }
  .btn-angle-active  { background: #7B2D5A !important; border-color: #7B2D5A !important; color: #fff !important; }
  .btn-area-active   { background: #4A3B8A !important; border-color: #4A3B8A !important; color: #fff !important; }
  .btn-zoom-active   { background: #2e2e2e !important; border-color: #888 !important; color: #e0e0e0 !important; }
  .btn-tog-active    { background: #2e2e2e !important; border-color: #888 !important; color: #e0e0e0 !important; }

  #sidebar::-webkit-scrollbar { width: 3px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }
  #sidebar::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 2px; }
  #sidebar::-webkit-scrollbar-thumb:hover { background: #555; }

  #resList { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #3a3a3a transparent; }
  #resList::-webkit-scrollbar { width: 3px; }
  #resList::-webkit-scrollbar-track { background: transparent; }
  #resList::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 2px; }
  #resList::-webkit-scrollbar-thumb:hover { background: #555; }
  .btn-clear-style   { color: #e24b4b; }
  .btn-row { display: flex; gap: 6px; }
  .btn-row button { flex: 1; padding: 7px 4px; }
  .kbd { color: #555; font-size: 10px; font-family: monospace; }

  #loadLabel {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1e1e1e;
    border: 0.5px solid #444;
    border-radius: 6px;
    padding: 7px 6px;
    font-size: 12px;
    color: #d0d0d0;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    text-align: center;
  }
  #loadLabel:hover { background: #2a2a2a; border-color: #666; }
  #scaleStatus {
    font-size: 11px;
    font-family: monospace;
    color: #666;
    padding: 7px 8px;
    background: #1e1e1e;
    border-radius: 6px;
    border: 0.5px solid #333;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>
<div id="app">

  <div id="sidebar">
    <div style="padding-bottom:12px;border-bottom:0.5px solid #333">
      <svg width="160" height="36" viewBox="0 0 160 36" fill="none">
        <text font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="500" letter-spacing="-0.5">

    </div>

    <div>
      <div class="btn-row">
        <label id="loadLabel" style="flex:1;min-width:0">
          Load image
          <input type="file" id="fileInput" accept="image/*" style="display:none">

        <button id="btnSaveProject" onclick="saveProject()" disabled style="flex:0 0 38px;padding:4px 0;display:flex;align-items:center;justify-content:center" title=""
          onmouseenter="showProjTip('save .mesuro')"

          <svg width="24" height="20" viewBox="0 0 40 32" fill="none">
            <line x1="6" y1="3" x2="6" y2="20" stroke="#d0d0d0" stroke-width="2" stroke-linecap="round"/>

            <text x="15" y="22" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#d0d0d0">S</text>

            <line x1="32" y1="26" x2="32" y2="28" stroke="#888"    stroke-width="1" stroke-linecap="round"/>

            <line x1="22" y1="26" x2="22" y2="28" stroke="#888"    stroke-width="1" stroke-linecap="round"/>
            <line x1="27" y1="26" x2="27" y2="29" stroke="#bbb"    stroke-width="1.2" stroke-linecap="round"/>
            <line x1="32" y1="26" x2="32" y2="28" stroke="#888"    stroke-width="1" stroke-linecap="round"/>
            <line x1="37" y1="26" x2="37" y2="30" stroke="#d0d0d0" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <input type="file" id="projectInput" accept=".mesuro" style="display:none">
      </div>
      <div id="projTip" style="font-size:10px;color:#555;font-style:italic;text-align:right;opacity:0;transition:opacity .15s;margin-top:2px;line-height:1;font-family:system-ui,-apple-system,sans-serif">&nbsp;</div>
    </div>

    <div style="margin-top:-6px">
      <div class="slbl">SCALE</div>
      <div class="btn-row">
        <div id="scaleStatus" style="flex:1;margin-bottom:0">Not set</div>
        <button id="btnScale" onclick="doScale()" disabled style="flex:1">Set</button>

    <div>
      <div class="slbl">MEASURE</div>
      <button id="btnMeasure" onclick="doMeasure()" disabled>↔ Distance <span class="kbd">L</span></button>
      <div class="btn-row" style="margin-top:6px">
        <button id="btnDiam"  onclick="doDiam()"  disabled>⌀ <span class="kbd">D</span></button>
        <button id="btnAngle" onclick="doAngle()" disabled>∠ <span class="kbd">A</span></button>
        <button id="btnArea"  onclick="doArea()"  disabled>⬡ <span class="kbd">R</span></button>
      </div>
    </div>

    <div>
      <div class="slbl">VIEW</div>
      <div style="display:flex;gap:6px">
        <button id="btnZoom" onclick="toggleZoom()" disabled style="flex:1;font-size:11px;text-align:center;white-space:normal;line-height:1.4;padding:5px 4px">⊕ Pan &amp; zoom<br><span class="kbd" style="font-size:10px">Z</span></button>
        <button id="btnMag"  onclick="toggleMag()"  disabled style="flex:1;font-size:11px;text-align:center;white-space:normal;line-height:1.4;padding:5px 4px">◎ Zoom cursor<br><span class="kbd" style="font-size:10px">C</span></button>

      <button id="btnUndo" onclick="undoLast()" disabled style="margin-bottom:6px">↩ Undo <span class="kbd">Ctrl+Z</span></button>
      <button id="btnClear" class="btn-clear-style" onclick="clearAll()" disabled style="margin-bottom:6px">Clear all</button>

        <button id="btnExportCSV" onclick="exportCSV()" disabled>CSV</button>
      </div>

  <div id="canvasArea">

      <svg width="48" height="48" viewBox="0 0 44 44" fill="none">
        <circle cx="22" cy="22" r="21" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="4 3"/>
        <path d="M22 13v11M16 19l6-6 6 6M13 30h18" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

          <line x1="24" y1="29" x2="24" y2="31" stroke="#5a7fbf" stroke-width="1.5" stroke-linecap="round"/>

<script>
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const ca  = document.getElementById('canvasArea');
const btnScale    = document.getElementById('btnScale');
const btnSaveProject = document.getElementById('btnSaveProject');
const btnMeasure  = document.getElementById('btnMeasure');
const btnDiam     = document.getElementById('btnDiam');
const btnAngle    = document.getElementById('btnAngle');
const btnArea     = document.getElementById('btnArea');
const btnZoom     = document.getElementById('btnZoom');
const btnMag      = document.getElementById('btnMag');
const btnUndo     = document.getElementById('btnUndo');
const btnClear    = document.getElementById('btnClear');
const btnExport   = document.getElementById('btnExport');
const btnExportCSV= document.getElementById('btnExportCSV');
const scaleStatus = document.getElementById('scaleStatus');
const resList     = document.getElementById('resList');
const noRes       = document.getElementById('noRes');
const measCount   = document.getElementById('measCount');
const hint        = document.getElementById('hint');
const toast       = document.getElementById('toast');
const modal       = document.getElementById('scaleModal');

/* ── state ── */
let img = null;
let mode = 'idle'; // idle|sa|sb|wait|ma|mb|da|db|aa|ab|ac|pa|drag
let p0 = null, p1 = null, mp = null;
let areaPts = [];
let scLine = null, scPx = null, scFactor = null, scUnit = 'mm';
let meas = [], pLine = null, hovIdx = -1, history = [];

/* ── zoom/pan ── */
let zoomEnabled = localStorage.getItem('mesu_zoom') !== null ? localStorage.getItem('mesu_zoom') === 'true' : false;
let magEnabled  = localStorage.getItem('mesu_mag')  !== null ? localStorage.getItem('mesu_mag')  === 'true' : true;
let zoom = 1, panX = 0, panY = 0;
let isPanning = false, panStart = null;
let spaceDown = false;


/* ── drag ── */
const DRAG_R = 10;
let dragState = null;

/* ── file loading ── */
document.getElementById('fileInput').onchange = e => { if (e.target.files[0]) { loadImg(e.target.files[0]); e.target.value=''; } };
document.getElementById('projectInput').onchange = e => { if (e.target.files[0]) { loadProject(e.target.files[0]); e.target.value=''; } };

ca.addEventListener('dragover', e => { e.preventDefault(); ca.style.outline='2px solid #1D9E75'; });
ca.addEventListener('dragleave', () => { ca.style.outline=''; });
ca.addEventListener('drop', e => {
  e.preventDefault(); ca.style.outline='';
  const f = e.dataTransfer.files[0];
  if (!f) return;
  if (f.name.endsWith('.mesuro')) loadProject(f);
  else if (f.type.startsWith('image/')) loadImg(f);
});

function loadImg(file) {
  const r = new FileReader();
  r.onload = ev => {
    const i = new Image();
    i.onload = () => {
      img = i; scLine=null; scPx=null; scFactor=null;
      meas=[]; history=[]; areaPts=[]; mode='idle'; p0=null; p1=null;
      zoom=1; panX=0; panY=0;
      fitImg();
      document.getElementById('dz').style.display='none';
      const ad = document.getElementById('adUnit');
      if (ad) ad.style.display='none';
      updUI();
    };
    i.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

function fitImg() {
  const aw=ca.clientWidth-20, ah=ca.clientHeight-20;
  const r=Math.min(aw/img.width, ah/img.height, 1);
  cv.width=Math.round(img.width*r); cv.height=Math.round(img.height*r);
  cv.style.display='block'; draw();
}

/* ── coords ── */
function canvasPx(e) {
  const rc=cv.getBoundingClientRect();
  return { x:(e.clientX-rc.left)*cv.width/rc.width, y:(e.clientY-rc.top)*cv.height/rc.height };
}
function pt(e) { const c=canvasPx(e); return { x:(c.x-panX)/zoom, y:(c.y-panY)/zoom }; }
function w2c(wx,wy) { return { x:wx*zoom+panX, y:wy*zoom+panY }; }
function dst(a,b) { return Math.hypot(b.x-a.x, b.y-a.y); }

/* ── zoom ── */
cv.addEventListener('wheel', e => {
  if (!img || !zoomEnabled) return;
  e.preventDefault();
  const c=canvasPx(e), f=e.deltaY<0?1.12:1/1.12;
  const nz=Math.max(0.5, Math.min(20, zoom*f));
  panX = c.x-(c.x-panX)*(nz/zoom);
  panY = c.y-(c.y-panY)*(nz/zoom);
  zoom=nz; clampPan(); draw();
}, { passive:false });

function clampPan() {
  panX=Math.max(ca.clientWidth*.1-cv.width*zoom, Math.min(ca.clientWidth*.9, panX));
  panY=Math.max(ca.clientHeight*.1-cv.height*zoom, Math.min(ca.clientHeight*.9, panY));
}
function toggleZoom() { zoomEnabled=!zoomEnabled; localStorage.setItem('mesu_zoom', zoomEnabled); if (!zoomEnabled) { zoom=1; panX=0; panY=0; draw(); } updUI(); }
function toggleMag()  { magEnabled=!magEnabled;   localStorage.setItem('mesu_mag',  magEnabled);  draw(); updUI(); }
function resetZoom()  { zoom=1; panX=0; panY=0; draw(); }

/* ── drag targets ── */
function findDrag(wp) {
  function near(ax,ay) { return dst(wp,{x:ax,y:ay})*zoom<DRAG_R; }
  for (let i=meas.length-1;i>=0;i--) {
    const m=meas[i];
    if (m.type==='line') {
      if (near(m.x1,m.y1)) return {idx:i,field:'p1'};
      if (near(m.x2,m.y2)) return {idx:i,field:'p2'};
    } else if (m.type==='diam') {
      if (near(m.x1,m.y1)) return {idx:i,field:'p1'};
      if (near(m.x2,m.y2)) return {idx:i,field:'p2'};
    } else if (m.type==='angle') {
      if (near(m.ax,m.ay)) return {idx:i,field:'a'};
      if (near(m.vx,m.vy)) return {idx:i,field:'v'};
      if (near(m.bx,m.by)) return {idx:i,field:'b'};
    } else if (m.type==='area') {
      for (let j=0;j<m.pts.length;j++) if (near(m.pts[j].x,m.pts[j].y)) return {idx:i,field:'pt',ptIdx:j};
    }
  }
  if (scLine) {
    if (near(scLine.x1,scLine.y1)) return {idx:-1,field:'p1'};
    if (near(scLine.x2,scLine.y2)) return {idx:-1,field:'p2'};
  }
  return null;
}

function applyDrag(wp) {
  if (!dragState) return;
  const {idx,field,ptIdx}=dragState;
  if (idx===-1 && scLine) {
    if (field==='p1'){scLine.x1=wp.x;scLine.y1=wp.y;}else{scLine.x2=wp.x;scLine.y2=wp.y;}
    const newPx=Math.hypot(scLine.x2-scLine.x1,scLine.y2-scLine.y1);
    if (newPx>0){const realLen=scFactor*scPx; scPx=newPx; scFactor=realLen/scPx;} return;
  }
  const m=meas[idx]; if (!m) return;
  if (m.type==='line') {
    if (field==='p1'){m.x1=wp.x;m.y1=wp.y;}else{m.x2=wp.x;m.y2=wp.y;}
    m.px=Math.hypot(m.x2-m.x1,m.y2-m.y1);
  } else if (m.type==='diam') {
    if (field==='p1'){m.x1=wp.x;m.y1=wp.y;}else{m.x2=wp.x;m.y2=wp.y;}
    m.cx=(m.x1+m.x2)/2; m.cy=(m.y1+m.y2)/2; m.r=Math.hypot(m.x2-m.x1,m.y2-m.y1)/2;
  } else if (m.type==='angle') {
    if (field==='a'){m.ax=wp.x;m.ay=wp.y;}else if(field==='v'){m.vx=wp.x;m.vy=wp.y;}else{m.bx=wp.x;m.by=wp.y;}
    m.deg=angleDeg({x:m.ax,y:m.ay},{x:m.vx,y:m.vy},{x:m.bx,y:m.by});
  } else if (m.type==='area') {
    m.pts[ptIdx]={x:wp.x,y:wp.y}; m.areaPx=polyArea(m.pts);
  }
}

/* ── mouse events ── */
cv.addEventListener('mousedown', e => {
  if (!img) return;
  const cp=canvasPx(e), wp=pt(e);
  if (e.button===1 || (e.button===0 && spaceDown)) {
    isPanning=true; panStart={mx:cp.x,my:cp.y,px:panX,py:panY};
    cv.style.cursor='grabbing'; e.preventDefault(); return;
  }
  if (e.button!==0) return;
  if (mode==='idle') {
    const t=findDrag(wp);
    if (t) { pushHistory(); dragState=t; mode='drag'; cv.style.cursor='grabbing'; }
  }
});

cv.addEventListener('mousemove', e => {
  if (!img) return;
  const cp=canvasPx(e), wp=pt(e);
  if (isPanning && panStart) {
    panX=panStart.px+(cp.x-panStart.mx); panY=panStart.py+(cp.y-panStart.my);
    clampPan(); draw(); return;
  }
  if (mode==='drag' && dragState) { applyDrag(wp); draw(); updUI(); return; }
  const dm=['sa','sb','ma','mb','da','db','aa','ab','ac','pa'];
  if (dm.includes(mode)) { mp=wp; draw(); return; }
  if (mode==='idle') {
    const t=findDrag(wp);
    cv.style.cursor = t ? 'grab' : (spaceDown ? 'grab' : 'default');
  }
});

cv.addEventListener('mouseup', e => {
  if (isPanning) { isPanning=false; panStart=null; cv.style.cursor=spaceDown?'grab':'default'; return; }
  if (mode==='drag') { mode='idle'; dragState=null; cv.style.cursor='default'; updUI(); draw(); }
});

cv.addEventListener('mouseleave', () => { if(mp){mp=null;draw();} isPanning=false; panStart=null; });

document.addEventListener('keydown', e => {
  if (e.code==='Space' && !e.target.matches('input') && mode==='idle') {
    spaceDown=true; if(img) cv.style.cursor='grab'; e.preventDefault();
  }
});
document.addEventListener('keyup', e => {
  if (e.code==='Space') { spaceDown=false; if(img&&mode==='idle') cv.style.cursor='default'; }
});

/* ── click ── */
cv.addEventListener('click', e => {
  if (!img||e.button!==0||isPanning||mode==='drag'||spaceDown) return;
  if (mode==='idle'||mode==='wait') return;
  const p=pt(e);

  if (mode==='sa') { p0=p; mode='sb'; setHint('Click end point — Esc'); }
  else if (mode==='sb') {
    if (dst(p0,p)<5/zoom) return;
    pLine={x1:p0.x,y1:p0.y,x2:p.x,y2:p.y}; mode='wait'; p0=null; mp=null; draw(); showModal();
  }
  else if (mode==='ma') { p0=p; mode='mb'; setHint('Click end point — Esc'); }
  else if (mode==='mb') {
    if (dst(p0,p)<5/zoom) return;
    pushHistory(); meas.push({type:'line',x1:p0.x,y1:p0.y,x2:p.x,y2:p.y,px:dst(p0,p)});
    p0=null; mp=null; mode='ma'; setHint('Click next start — Esc to stop'); draw(); updUI();
  }
  else if (mode==='da') { p0=p; mode='db'; setHint('Click second diameter point — Esc'); }
  else if (mode==='db') {
    if (dst(p0,p)<5/zoom) return;
    pushHistory();
    const r=dst(p0,p)/2, cx=(p0.x+p.x)/2, cy=(p0.y+p.y)/2;
    meas.push({type:'diam',cx,cy,r,x1:p0.x,y1:p0.y,x2:p.x,y2:p.y});
    p0=null; mp=null; mode='da'; setHint('Click next — Esc to stop'); draw(); updUI();
  }
  else if (mode==='aa') { p0=p; mode='ab'; setHint('Click vertex — Esc'); }
  else if (mode==='ab') {
    if (dst(p0,p)<5/zoom) return;
    p1=p; mode='ac'; setHint('Click second arm — Esc');
  }
  else if (mode==='ac') {
    if (dst(p1,p)<5/zoom) return;
    pushHistory(); meas.push({type:'angle',ax:p0.x,ay:p0.y,vx:p1.x,vy:p1.y,bx:p.x,by:p.y,deg:angleDeg(p0,p1,p)});
    p0=null; p1=null; mp=null; mode='aa'; setHint('Click next — Esc to stop'); draw(); updUI();
  }
  else if (mode==='pa') {
    if (areaPts.length>=3) {
      const c0=w2c(areaPts[0].x,areaPts[0].y), cm=w2c(p.x,p.y);
      if (dst(c0,cm)<DRAG_R) { closeArea(); return; }
    }
    areaPts.push(p);
    setHint(`${areaPts.length} pt${areaPts.length>1?'s':''} — click start or Enter to close — Esc`);
    draw();
  }
});

cv.addEventListener('dblclick', e => { if (mode==='pa'&&areaPts.length>=3) closeArea(); });

function closeArea() {
  pushHistory(); meas.push({type:'area',pts:[...areaPts],areaPx:polyArea(areaPts)});
  areaPts=[]; mp=null; mode='pa'; setHint('Click to start next area — Esc to stop'); draw(); updUI();
}

/* ── keyboard ── */
document.addEventListener('keydown', e => {
  if (e.target.matches('input')) return;
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undoLast(); return; }
  if (e.key==='Escape') {
    if (mode==='sa'||mode==='sb'||mode==='wait') cancelScale();
    else if (mode!=='idle') { mode='idle'; p0=null; p1=null; mp=null; areaPts=[]; clearHint(); draw(); updUI(); }
    return;
  }
  if (e.key==='Enter'&&mode==='pa'&&areaPts.length>=3) { closeArea(); return; }
  if (!e.ctrlKey&&!e.metaKey&&!e.altKey) {
    if ((e.key==='l'||e.key==='L')&&img&&scFactor) doMeasure();
    if ((e.key==='d'||e.key==='D')&&img&&scFactor) doDiam();
    if ((e.key==='a'||e.key==='A')&&img&&scFactor) doAngle();
    if ((e.key==='r'||e.key==='R')&&img&&scFactor) doArea();
    if ((e.key==='z'||e.key==='Z')&&img) toggleZoom();
    if ((e.key==='c'||e.key==='C')&&img) toggleMag();
    if (e.key==='0'&&img) resetZoom();
  }
});

/* ── tools ── */
function stopTool() { mode='idle'; p0=null; p1=null; mp=null; areaPts=[]; clearHint(); draw(); updUI(); }
function doScale()   { if(mode==='sa'||mode==='sb'){stopTool();return;} stopTool(); mode='sa'; setHint('Click start of scale line'); updUI(); }
function doMeasure() { if(mode==='ma'||mode==='mb'){stopTool();return;} if(!scFactor)return; stopTool(); mode='ma'; setHint('L — click start point'); updUI(); }
function doDiam()    { if(mode==='da'||mode==='db'){stopTool();return;} if(!scFactor)return; stopTool(); mode='da'; setHint('D — click first diameter point'); updUI(); }
function doAngle()   { if(mode==='aa'||mode==='ab'||mode==='ac'){stopTool();return;} if(!scFactor)return; stopTool(); mode='aa'; setHint('A — click first arm point'); updUI(); }
function doArea()    { if(mode==='pa'){stopTool();return;} if(!scFactor)return; stopTool(); mode='pa'; areaPts=[]; setHint('R — click points — Enter or click start to close'); updUI(); }
function clearAll()  { meas=[]; scLine=null; scPx=null; scFactor=null; history=[]; areaPts=[]; stopTool(); }

/* ── undo ── */
function pushHistory() { history.push(JSON.parse(JSON.stringify(meas))); if(history.length>50) history.shift(); }
function undoLast()    { if(!history.length)return; meas=history.pop(); draw(); updUI(); }

/* ── modal ── */
function showModal() { modal.style.display='flex'; const sv=document.getElementById('sVal'); sv.value=''; sv.style.borderColor=''; sv.focus(); }
function cancelScale() { modal.style.display='none'; pLine=null; stopTool(); }
function confirmScale() {
  const sv=document.getElementById('sVal'), val=parseFloat(sv.value);
  if (!val||val<=0) { sv.style.borderColor='#E24B4A'; sv.focus(); return; }
  sv.style.borderColor='';
  scUnit=document.getElementById('sUnit').value.trim()||'mm';
  scLine=pLine; scPx=Math.hypot(scLine.x2-scLine.x1,scLine.y2-scLine.y1); scFactor=val/scPx;
  pLine=null; modal.style.display='none'; stopTool();
}
document.getElementById('sVal').addEventListener('keydown', e => { if(e.key==='Enter')confirmScale(); if(e.key==='Escape')cancelScale(); });

/* ── math ── */
function angleDeg(a,v,b) {
  const ax=a.x-v.x,ay=a.y-v.y,bx=b.x-v.x,by=b.y-v.y;
  return Math.acos(Math.max(-1,Math.min(1,(ax*bx+ay*by)/(Math.hypot(ax,ay)*Math.hypot(bx,by)))))*180/Math.PI;
}
function polyArea(pts) {
  let a=0;
  for (let i=0;i<pts.length;i++){const j=(i+1)%pts.length; a+=pts[i].x*pts[j].y-pts[j].x*pts[i].y;}
  return Math.abs(a)/2;
}

/* ── UI ── */
function updUI() {
  const hasImg=!!img, hasSc=!!scFactor;
  const isSc=mode==='sa'||mode==='sb'||mode==='wait';
  const isMeas=mode==='ma'||mode==='mb', isDiam=mode==='da'||mode==='db';
  const isAngle=mode==='aa'||mode==='ab'||mode==='ac', isArea=mode==='pa';

  btnScale.disabled=!hasImg; btnSaveProject.disabled=!hasImg; btnMeasure.disabled=!hasSc; btnDiam.disabled=!hasSc;
  btnAngle.disabled=!hasSc; btnArea.disabled=!hasSc; btnZoom.disabled=!hasImg;
  btnMag.disabled=!hasImg; btnUndo.disabled=!history.length; btnClear.disabled=!hasImg;
  btnExport.disabled=!hasImg; btnExportCSV.disabled=!hasImg;

  btnScale.className=isSc?'btn-scale-active':'';
  btnScale.textContent=isSc?'Cancel':(hasSc?'Reset':'Set');
  btnMeasure.className=isMeas?'btn-meas-active':'';
  btnMeasure.innerHTML=isMeas?'Stop':'↔ Distance <span class="kbd">L</span>';
  btnDiam.className=isDiam?'btn-diam-active':'';
  btnDiam.innerHTML=isDiam?'Stop':'⌀ <span class="kbd">D</span>';
  btnAngle.className=isAngle?'btn-angle-active':'';
  btnAngle.innerHTML=isAngle?'Stop':'∠ <span class="kbd">A</span>';
  btnArea.className=isArea?'btn-area-active':'';
  btnArea.innerHTML=isArea?'Stop':'⬡ <span class="kbd">R</span>';
  btnZoom.className=zoomEnabled?'btn-zoom-active':'';
  btnZoom.innerHTML=`${zoomEnabled?'⊖':'⊕'} Pan &amp; zoom<br><span class="kbd">Z</span>`;
  btnMag.className=magEnabled?'btn-tog-active':'';
  btnMag.innerHTML=`${magEnabled?'◉':'◎'} Zoom cursor<br><span class="kbd">C</span>`;

  const activeTool=isMeas||isDiam||isAngle||isArea||isSc;
  cv.style.cursor=activeTool?(magEnabled?'none':'crosshair'):mode==='drag'?'grabbing':'default';

  if (hasSc) { scaleStatus.textContent=`${(1/scFactor).toFixed(2)} px\u202f/\u202f${scUnit}`; scaleStatus.style.color='#1D9E75'; }
  else { scaleStatus.textContent='Not set'; scaleStatus.style.color=''; }

  measCount.textContent=meas.length?`(${meas.length})`:'';
  noRes.style.display=meas.length?'none':'block';
  resList.innerHTML='';

  meas.forEach((m,i) => {
    const col=m.type==='diam'?'#5DCAA5':m.type==='angle'?'#D4537E':m.type==='area'?'#9F77DD':'#EF9F27';
    let icon,valTxt,pxTxt='';
    if (m.type==='line') {
      icon='↔'; const r=scFactor?m.px*scFactor:null;
      valTxt=r!==null?`${r.toFixed(2)} ${scUnit}`:`${Math.round(m.px)} px`; pxTxt=`${Math.round(m.px)}px`;
    } else if (m.type==='diam') {
      icon='⌀'; const r=scFactor?m.r*2*scFactor:null;
      valTxt=r!==null?`${r.toFixed(2)} ${scUnit}`:`${Math.round(m.r*2)} px`; pxTxt=`${Math.round(m.r*2)}px`;
    } else if (m.type==='angle') {
      icon='∠'; valTxt=`${m.deg.toFixed(1)}°`;
    } else if (m.type==='area') {
      icon='⬡'; const r=scFactor?m.areaPx*scFactor*scFactor:null;
      valTxt=r!==null?`${r.toFixed(2)} ${scUnit}²`:`${Math.round(m.areaPx)} px²`; pxTxt=`${Math.round(m.areaPx)}px²`;
    }
    const d=document.createElement('div');
    d.className='res-item';
    d.innerHTML=`<span class="num" style="color:${col}">${icon}${i+1}</span><span class="val" title="Click to copy">${valTxt}</span><span class="px">${pxTxt}</span><span class="del" onclick="delM(${i})">&times;</span>`;
    d.querySelector('.val').addEventListener('click',()=>copyVal(valTxt));
    d.addEventListener('mouseenter',()=>{hovIdx=i;draw();});
    d.addEventListener('mouseleave',()=>{hovIdx=-1;draw();});
    resList.appendChild(d);
  });
}

function delM(i) { pushHistory(); meas.splice(i,1); if(hovIdx>=meas.length)hovIdx=-1; draw(); updUI(); }

let toastTimer;
function copyVal(txt) { navigator.clipboard.writeText(txt).catch(()=>{}); showToast('Copied: '+txt); }
function showToast(msg) { toast.textContent=msg; toast.style.display='block'; clearTimeout(toastTimer); toastTimer=setTimeout(()=>{toast.style.display='none';},1800); }

/* ── draw ── */
function draw() {
  ctx.clearRect(0,0,cv.width,cv.height);
  if (!img) return;

  ctx.save(); ctx.setTransform(zoom,0,0,zoom,panX,panY);
  ctx.drawImage(img,0,0,cv.width,cv.height);

  if (scLine) annLine(scLine.x1,scLine.y1,scLine.x2,scLine.y2,'#1D9E75','scale',false);
  if (pLine)  annLine(pLine.x1,pLine.y1,pLine.x2,pLine.y2,'#1D9E75',null,false);

  meas.forEach((m,i) => {
    const hi=hovIdx===i;
    if (m.type==='line') {
      const r=scFactor?m.px*scFactor:null;
      annLine(m.x1,m.y1,m.x2,m.y2,'#EF9F27',r!==null?`#${i+1}  ${r.toFixed(2)} ${scUnit}`:`#${i+1}  ${Math.round(m.px)}px`,hi);
    } else if (m.type==='diam') {
      const r=scFactor?m.r*2*scFactor:null;
      annDiam(m.cx,m.cy,m.r,m.x1,m.y1,m.x2,m.y2,'#5DCAA5',r!==null?`⌀${i+1}  ${r.toFixed(2)} ${scUnit}`:`⌀${i+1}  ${Math.round(m.r*2)}px`,hi);
    } else if (m.type==='angle') {
      annAngle(m.ax,m.ay,m.vx,m.vy,m.bx,m.by,m.deg,`∠${i+1}  ${m.deg.toFixed(1)}°`,hi);
    } else if (m.type==='area') {
      const r=scFactor?m.areaPx*scFactor*scFactor:null;
      annArea(m.pts,r!==null?`⬡${i+1}  ${r.toFixed(2)} ${scUnit}²`:`⬡${i+1}  ${Math.round(m.areaPx)}px²`,hi);
    }
  });

  // live previews
  if (p0&&mp) {
    if (mode==='sb') rubberLine(p0,mp,'#1D9E75',null);
    else if (mode==='mb') { const d=dst(p0,mp); rubberLine(p0,mp,'#EF9F27',scFactor?`${(d*scFactor).toFixed(2)} ${scUnit}`:`${Math.round(d)}px`); }
    else if (mode==='db') {
      const r=dst(p0,mp)/2,cx=(p0.x+mp.x)/2,cy=(p0.y+mp.y)/2;
      const txt=scFactor?`⌀ ${(r*2*scFactor).toFixed(2)} ${scUnit}`:`⌀ ${Math.round(r*2)}px`;
      ctx.save(); ctx.strokeStyle='#5DCAA5'; ctx.lineWidth=1.5/zoom; ctx.globalAlpha=0.75; ctx.setLineDash([5/zoom,4/zoom]);
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]); ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(mp.x,mp.y); ctx.stroke();
      ctx.globalAlpha=1; ctx.fillStyle='#5DCAA5';
      ctx.beginPath(); ctx.arc(p0.x,p0.y,4/zoom,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(mp.x,mp.y,4/zoom,0,Math.PI*2); ctx.fill();
      ctx.restore(); drawLabel(cx,cy-r-10/zoom,txt,'#5DCAA5');
    }
    else if (mode==='ab') rubberLine(p0,mp,'#D4537E',null);
    else if (mode==='ac'&&p1) {
      const deg=angleDeg(p0,p1,mp);
      ctx.save(); ctx.strokeStyle='#D4537E'; ctx.lineWidth=1.5/zoom; ctx.globalAlpha=0.8;
      ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(mp.x,mp.y); ctx.stroke();
      const a1=Math.atan2(p0.y-p1.y,p0.x-p1.x),a2=Math.atan2(mp.y-p1.y,mp.x-p1.x);
      const arcR=Math.min(dst(p0,p1),dst(p1,mp))*0.3;
      ctx.setLineDash([3/zoom,3/zoom]); ctx.beginPath(); ctx.arc(p1.x,p1.y,arcR,a1,a2); ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha=1; ctx.fillStyle='#D4537E';
      for (const pp of [p0,p1,mp]){ctx.beginPath();ctx.arc(pp.x,pp.y,3/zoom,0,Math.PI*2);ctx.fill();}
      ctx.restore(); drawLabel(p1.x+Math.cos((a1+a2)/2)*(arcR+18/zoom),p1.y+Math.sin((a1+a2)/2)*(arcR+18/zoom),`${deg.toFixed(1)}°`,'#D4537E');
    }
  }
  if (mode==='ac'&&p0&&p1&&!mp) {
    ctx.save(); ctx.strokeStyle='#D4537E'; ctx.lineWidth=1.5/zoom;
    ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.stroke();
    ctx.fillStyle='#D4537E';
    ctx.beginPath(); ctx.arc(p0.x,p0.y,3/zoom,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(p1.x,p1.y,3/zoom,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // area in progress
  if (mode==='pa'&&areaPts.length>0) {
    ctx.save(); ctx.strokeStyle='#9F77DD'; ctx.lineWidth=1.5/zoom; ctx.fillStyle='rgba(159,119,221,.12)';
    ctx.beginPath(); ctx.moveTo(areaPts[0].x,areaPts[0].y);
    for (let i=1;i<areaPts.length;i++) ctx.lineTo(areaPts[i].x,areaPts[i].y);
    if (mp) ctx.lineTo(mp.x,mp.y);
    ctx.stroke(); if (mp&&areaPts.length>=2) ctx.fill();
    ctx.fillStyle='#9F77DD';
    areaPts.forEach((pp,i)=>{ctx.beginPath();ctx.arc(pp.x,pp.y,(i===0?5:3)/zoom,0,Math.PI*2);ctx.fill();});
    if (areaPts.length>=3&&mp) {
      const c0=areaPts[0];
      if (dst(c0,mp)*zoom<DRAG_R){ctx.save();ctx.strokeStyle='#fff';ctx.lineWidth=1/zoom;ctx.beginPath();ctx.arc(c0.x,c0.y,7/zoom,0,Math.PI*2);ctx.stroke();ctx.restore();}
    }
    ctx.restore();
  }

  ctx.restore(); // end world transform

  // magnifier in screen space
  const am=['sa','sb','ma','mb','da','db','aa','ab','ac','pa'];
  if (mp&&am.includes(mode)&&magEnabled) {
    const col=(mode==='sa'||mode==='sb')?'#1D9E75':(mode==='da'||mode==='db')?'#5DCAA5':(mode==='aa'||mode==='ab'||mode==='ac')?'#D4537E':mode==='pa'?'#9F77DD':'#EF9F27';
    const sc=w2c(mp.x,mp.y);
    drawMagnifier(sc.x,sc.y,mp.x,mp.y,col);
  }
}

function rubberLine(a,b,col,label) {
  ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=1.5/zoom; ctx.setLineDash([5/zoom,4/zoom]); ctx.globalAlpha=0.8;
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha=1; ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(a.x,a.y,4/zoom,0,Math.PI*2); ctx.fill();
  if (label) drawLabel((a.x+b.x)/2,(a.y+b.y)/2-10/zoom,label,col);
  ctx.restore();
}

function annLine(x1,y1,x2,y2,col,label,hi) {
  ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=(hi?2.5:1.5)/zoom;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  const angle=Math.atan2(y2-y1,x2-x1)+Math.PI/2, tick=6/zoom;
  for (const [px,py] of [[x1,y1],[x2,y2]]) {
    ctx.beginPath(); ctx.moveTo(px+Math.cos(angle)*tick,py+Math.sin(angle)*tick);
    ctx.lineTo(px-Math.cos(angle)*tick,py-Math.sin(angle)*tick); ctx.stroke();
  }
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(x1,y1,4/zoom,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x2,y2,4/zoom,0,Math.PI*2); ctx.fill();
  if (label) drawLabel((x1+x2)/2,(y1+y2)/2-10/zoom,label,col);
  ctx.restore();
}

function annDiam(cx,cy,r,x1,y1,x2,y2,col,label,hi) {
  ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=(hi?2.5:1.5)/zoom;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([4/zoom,3/zoom]); ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.setLineDash([]); ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(x1,y1,4/zoom,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x2,y2,4/zoom,0,Math.PI*2); ctx.fill();
  const cs=5/zoom; ctx.beginPath(); ctx.moveTo(cx-cs,cy); ctx.lineTo(cx+cs,cy); ctx.moveTo(cx,cy-cs); ctx.lineTo(cx,cy+cs); ctx.stroke();
  if (label) drawLabel(cx,cy-r-10/zoom,label,col);
  ctx.restore();
}

function annAngle(ax,ay,vx,vy,bx,by,deg,label,hi) {
  const col='#D4537E'; ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=(hi?2.5:1.5)/zoom;
  ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(vx,vy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(vx,vy); ctx.lineTo(bx,by); ctx.stroke();
  const a1=Math.atan2(ay-vy,ax-vx),a2=Math.atan2(by-vy,bx-vx);
  const arcR=Math.min(Math.hypot(ax-vx,ay-vy),Math.hypot(bx-vx,by-vy))*0.3;
  ctx.setLineDash([3/zoom,3/zoom]); ctx.beginPath(); ctx.arc(vx,vy,arcR,a1,a2); ctx.stroke();
  ctx.setLineDash([]); ctx.fillStyle=col;
  for (const [px,py] of [[ax,ay],[vx,vy],[bx,by]]){ctx.beginPath();ctx.arc(px,py,4/zoom,0,Math.PI*2);ctx.fill();}
  if (label) drawLabel(vx+Math.cos((a1+a2)/2)*(arcR+18/zoom),vy+Math.sin((a1+a2)/2)*(arcR+18/zoom),label,col);
  ctx.restore();
}

function annArea(pts,label,hi) {
  const col='#9F77DD'; ctx.save();
  ctx.fillStyle='rgba(159,119,221,.1)'; ctx.strokeStyle=col; ctx.lineWidth=(hi?2.5:1.5)/zoom;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle=col;
  pts.forEach(pp=>{ctx.beginPath();ctx.arc(pp.x,pp.y,4/zoom,0,Math.PI*2);ctx.fill();});
  const cx=pts.reduce((s,p)=>s+p.x,0)/pts.length, cy=pts.reduce((s,p)=>s+p.y,0)/pts.length;
  if (label) drawLabel(cx,cy,label,col);
  ctx.restore();
}

function drawLabel(x,y,text,col) {
  const s=1/zoom; ctx.save(); ctx.font=`bold ${Math.max(9,11*s)}px monospace`;
  const tw=ctx.measureText(text).width, p=5*s,h=17*s,r=4*s,rx=x-tw/2-p,ry=y-h/2;
  ctx.fillStyle='rgba(0,0,0,.8)'; ctx.beginPath();
  ctx.moveTo(rx+r,ry); ctx.lineTo(rx+tw+p*2-r,ry); ctx.arcTo(rx+tw+p*2,ry,rx+tw+p*2,ry+r,r);
  ctx.lineTo(rx+tw+p*2,ry+h-r); ctx.arcTo(rx+tw+p*2,ry+h,rx+tw+p*2-r,ry+h,r);
  ctx.lineTo(rx+r,ry+h); ctx.arcTo(rx,ry+h,rx,ry+h-r,r); ctx.lineTo(rx,ry+r); ctx.arcTo(rx,ry,rx+r,ry,r);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle=col; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(text,x,y); ctx.restore();
}

/* ── magnifier (screen space) ── */
function drawMagnifier(scx,scy,wx,wy,col) {
  const MAG_R=72, ZOOM_F=5, OFFSET=MAG_R+18;
  const flipX=scx+OFFSET+MAG_R>cv.width, flipY=scy-OFFSET-MAG_R<0;
  const mx=scx+(flipX?-OFFSET:OFFSET), my=scy+(flipY?OFFSET:-OFFSET);
  const SRC_H=MAG_R/ZOOM_F, ir=img.width/cv.width, ir2=img.height/cv.height;
  const srcX=(wx-SRC_H)*ir, srcY=(wy-SRC_H)*ir2, srcW=SRC_H*2*ir, srcH=SRC_H*2*ir2;

  ctx.save(); ctx.setTransform(1,0,0,1,0,0);
  ctx.beginPath(); ctx.arc(mx,my,MAG_R,0,Math.PI*2); ctx.clip();
  ctx.fillStyle='#111'; ctx.fillRect(mx-MAG_R,my-MAG_R,MAG_R*2,MAG_R*2);
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(img,srcX,srcY,srcW,srcH,mx-MAG_R,my-MAG_R,MAG_R*2,MAG_R*2);
  ctx.imageSmoothingEnabled=true; ctx.restore();

  ctx.save(); ctx.setTransform(1,0,0,1,0,0);
  ctx.beginPath(); ctx.arc(mx,my,MAG_R,0,Math.PI*2); ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(mx,my,MAG_R+1,0,Math.PI*2); ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=1; ctx.stroke();
  const ARM=MAG_R-4,GAP=5;
  ctx.strokeStyle='rgba(0,0,0,.55)'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.beginPath();
  ctx.moveTo(mx-ARM,my);ctx.lineTo(mx-GAP,my);ctx.moveTo(mx+GAP,my);ctx.lineTo(mx+ARM,my);
  ctx.moveTo(mx,my-ARM);ctx.lineTo(mx,my-GAP);ctx.moveTo(mx,my+GAP);ctx.lineTo(mx,my+ARM); ctx.stroke();
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.beginPath();
  ctx.moveTo(mx-ARM,my);ctx.lineTo(mx-GAP,my);ctx.moveTo(mx+GAP,my);ctx.lineTo(mx+ARM,my);
  ctx.moveTo(mx,my-ARM);ctx.lineTo(mx,my-GAP);ctx.moveTo(mx,my+GAP);ctx.lineTo(mx,my+ARM); ctx.stroke();
  ctx.beginPath(); ctx.arc(mx,my,2,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
  const coordTxt=`${Math.round(wx*ir)}, ${Math.round(wy*ir2)}`;
  ctx.font='bold 10px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  const tw=ctx.measureText(coordTxt).width,lx=mx,ly=my+MAG_R-12,pw=tw/2+5,ph=8,pr=3;
  ctx.fillStyle='rgba(0,0,0,.7)'; ctx.beginPath(); ctx.roundRect(lx-pw,ly-ph,pw*2,ph*2,pr); ctx.fill();
  ctx.fillStyle=col; ctx.fillText(coordTxt,lx,ly);
  ctx.beginPath(); ctx.arc(scx,scy,3,0,Math.PI*2); ctx.strokeStyle='rgba(0,0,0,.6)'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle=col; ctx.fill();
  ctx.restore();
}

/* ── hint ── */
/* ─── Project save / load ────────────────────────────────────────────────── */
function saveProject() {
  if (!img) return;
  const ec = document.createElement('canvas');
  ec.width = img.width; ec.height = img.height;
  ec.getContext('2d').drawImage(img, 0, 0);
  const project = {
    version: 1, format: 'mesu',
    savedAt: new Date().toISOString(),
    image: ec.toDataURL('image/jpeg', 0.92),
    scale: scFactor ? { line: scLine, px: scPx, factor: scFactor, unit: scUnit } : null,
    measurements: meas
  };
  const blob = new Blob([JSON.stringify(project)], { type: 'application/json' });
  const a = document.createElement('a');
  a.download = `mesu-${new Date().toISOString().slice(0,10)}.mesuro`;
  a.href = URL.createObjectURL(blob); a.click(); URL.revokeObjectURL(a.href);
  showToast('Project saved');
}

function loadProject(file) {
  const r = new FileReader();
  r.onload = ev => {
    try {
      const p = JSON.parse(ev.target.result);
      if (p.format !== 'mesu') { showToast('Invalid .mesu file'); return; }
      const i = new Image();
      i.onload = () => {
        img = i;
        scLine   = p.scale ? p.scale.line   : null;
        scPx     = p.scale ? p.scale.px     : null;
        scFactor = p.scale ? p.scale.factor : null;
        scUnit   = p.scale ? p.scale.unit   : 'mm';
        meas     = p.measurements || [];
        history  = []; areaPts = []; mode = 'idle'; p0 = null; p1 = null;
        zoom = 1; panX = 0; panY = 0;
        fitImg();
        document.getElementById('dz').style.display = 'none';
        const ad = document.getElementById('adUnit');
        if (ad) ad.style.display = 'none';
        updUI(); showToast('Project loaded');
      };
      i.src = p.image;
    } catch(e) { showToast('Could not read project file'); }
  };
  r.readAsText(file);
}

function setHint(t)  { hint.textContent=t; hint.style.display='block'; }
function clearHint() { hint.style.display='none'; }

function showProjTip(msg) { const t=document.getElementById('projTip'); if(t){t.textContent=msg; t.style.opacity='1';} }
function hideProjTip()    { const t=document.getElementById('projTip'); if(t) t.style.opacity='0'; }

/* ── export PNG ── */
function exportImg() {
  if (!img) return;
  const ec=document.createElement('canvas'); ec.width=img.width; ec.height=img.height;
  const ec_ctx=ec.getContext('2d'); ec_ctx.drawImage(img,0,0);
  const sx=img.width/cv.width, sy=img.height/cv.height;
  function spt(x,y){return[x*sx,y*sy];}
  if (scLine){const[x1,y1]=spt(scLine.x1,scLine.y1),[x2,y2]=spt(scLine.x2,scLine.y2);drawAnnOn(ec_ctx,x1,y1,x2,y2,'#1D9E75','scale',sx);}
  meas.forEach((m,i)=>{
    if (m.type==='line'){const r=scFactor?m.px*scFactor:null;const[x1,y1]=spt(m.x1,m.y1),[x2,y2]=spt(m.x2,m.y2);drawAnnOn(ec_ctx,x1,y1,x2,y2,'#EF9F27',r!==null?`#${i+1}  ${r.toFixed(2)} ${scUnit}`:`#${i+1}  ${Math.round(m.px)}px`,sx);}
    else if(m.type==='diam'){const r=scFactor?m.r*2*scFactor:null;const[cx,cy]=spt(m.cx,m.cy),ra=m.r*sx,[x1,y1]=spt(m.x1,m.y1),[x2,y2]=spt(m.x2,m.y2);drawDiamOn(ec_ctx,cx,cy,ra,x1,y1,x2,y2,'#5DCAA5',r!==null?`⌀${i+1}  ${r.toFixed(2)} ${scUnit}`:`⌀${i+1}  ${Math.round(m.r*2)}px`,sx);}
    else if(m.type==='angle'){const[ax,ay]=spt(m.ax,m.ay),[vx,vy]=spt(m.vx,m.vy),[bx,by]=spt(m.bx,m.by);drawAngleOn(ec_ctx,ax,ay,vx,vy,bx,by,m.deg,`∠${i+1}  ${m.deg.toFixed(1)}°`,sx);}
    else if(m.type==='area'){const r=scFactor?m.areaPx*scFactor*scFactor:null;const spts=m.pts.map(p=>({x:p.x*sx,y:p.y*sy}));drawAreaOn(ec_ctx,spts,r!==null?`⬡${i+1}  ${r.toFixed(2)} ${scUnit}²`:`⬡${i+1}  ${Math.round(m.areaPx)}px²`,sx);}
  });
  const a=document.createElement('a'); a.download='mesuro-export.png'; a.href=ec.toDataURL('image/png'); a.click();
}

function drawLblOn(ec,x,y,text,col,s){ec.save();const fs=Math.max(11,11*s);ec.font=`bold ${fs}px monospace`;const tw=ec.measureText(text).width,p=5*s,h=17*s,r=4*s,rx=x-tw/2-p,ry=y-h/2;ec.fillStyle='rgba(0,0,0,.8)';ec.beginPath();ec.moveTo(rx+r,ry);ec.lineTo(rx+tw+p*2-r,ry);ec.arcTo(rx+tw+p*2,ry,rx+tw+p*2,ry+r,r);ec.lineTo(rx+tw+p*2,ry+h-r);ec.arcTo(rx+tw+p*2,ry+h,rx+tw+p*2-r,ry+h,r);ec.lineTo(rx+r,ry+h);ec.arcTo(rx,ry+h,rx,ry+h-r,r);ec.lineTo(rx,ry+r);ec.arcTo(rx,ry,rx+r,ry,r);ec.closePath();ec.fill();ec.fillStyle=col;ec.textAlign='center';ec.textBaseline='middle';ec.fillText(text,x,y);ec.restore();}
function drawAnnOn(ec,x1,y1,x2,y2,col,label,s){ec.save();ec.strokeStyle=col;ec.lineWidth=2*s;ec.beginPath();ec.moveTo(x1,y1);ec.lineTo(x2,y2);ec.stroke();const angle=Math.atan2(y2-y1,x2-x1)+Math.PI/2,tick=6*s;for(const[px,py]of[[x1,y1],[x2,y2]]){ec.beginPath();ec.moveTo(px+Math.cos(angle)*tick,py+Math.sin(angle)*tick);ec.lineTo(px-Math.cos(angle)*tick,py-Math.sin(angle)*tick);ec.stroke();}ec.fillStyle=col;ec.beginPath();ec.arc(x1,y1,4*s,0,Math.PI*2);ec.fill();ec.beginPath();ec.arc(x2,y2,4*s,0,Math.PI*2);ec.fill();if(label)drawLblOn(ec,(x1+x2)/2,(y1+y2)/2-10*s,label,col,s);ec.restore();}
function drawDiamOn(ec,cx,cy,r,x1,y1,x2,y2,col,label,s){ec.save();ec.strokeStyle=col;ec.lineWidth=2*s;ec.beginPath();ec.arc(cx,cy,r,0,Math.PI*2);ec.stroke();ec.setLineDash([4*s,3*s]);ec.beginPath();ec.moveTo(x1,y1);ec.lineTo(x2,y2);ec.stroke();ec.setLineDash([]);ec.fillStyle=col;ec.beginPath();ec.arc(x1,y1,4*s,0,Math.PI*2);ec.fill();ec.beginPath();ec.arc(x2,y2,4*s,0,Math.PI*2);ec.fill();const cs=5*s;ec.beginPath();ec.moveTo(cx-cs,cy);ec.lineTo(cx+cs,cy);ec.moveTo(cx,cy-cs);ec.lineTo(cx,cy+cs);ec.stroke();if(label)drawLblOn(ec,cx,cy-r-10*s,label,col,s);ec.restore();}
function drawAngleOn(ec,ax,ay,vx,vy,bx,by,deg,label,s){const col='#D4537E';ec.save();ec.strokeStyle=col;ec.lineWidth=2*s;ec.beginPath();ec.moveTo(ax,ay);ec.lineTo(vx,vy);ec.stroke();ec.beginPath();ec.moveTo(vx,vy);ec.lineTo(bx,by);ec.stroke();const a1=Math.atan2(ay-vy,ax-vx),a2=Math.atan2(by-vy,bx-vx),arcR=Math.min(Math.hypot(ax-vx,ay-vy),Math.hypot(bx-vx,by-vy))*0.3;ec.setLineDash([3*s,3*s]);ec.beginPath();ec.arc(vx,vy,arcR,a1,a2);ec.stroke();ec.setLineDash([]);ec.fillStyle=col;for(const[px,py]of[[ax,ay],[vx,vy],[bx,by]]){ec.beginPath();ec.arc(px,py,4*s,0,Math.PI*2);ec.fill();}const midA=(a1+a2)/2;if(label)drawLblOn(ec,vx+Math.cos(midA)*(arcR+20*s),vy+Math.sin(midA)*(arcR+20*s),label,col,s);ec.restore();}
function drawAreaOn(ec,pts,label,s){const col='#9F77DD';ec.save();ec.fillStyle='rgba(159,119,221,.15)';ec.strokeStyle=col;ec.lineWidth=2*s;ec.beginPath();ec.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++)ec.lineTo(pts[i].x,pts[i].y);ec.closePath();ec.fill();ec.stroke();ec.fillStyle=col;pts.forEach(pp=>{ec.beginPath();ec.arc(pp.x,pp.y,4*s,0,Math.PI*2);ec.fill();});const cx=pts.reduce((s,p)=>s+p.x,0)/pts.length,cy=pts.reduce((s,p)=>s+p.y,0)/pts.length;if(label)drawLblOn(ec,cx,cy,label,col,s);ec.restore();}

/* ── export CSV ── */
function exportCSV() {
  if (!meas.length) return;
  const ir=img.width/cv.width, ir2=img.height/cv.height;
  const rows=[['#','type','value','unit','px_value','x1','y1','x2','y2','cx','cy','radius_px','vertex_x','vertex_y','arm1_x','arm1_y','arm2_x','arm2_y','area_pts']];
  meas.forEach((m,i)=>{
    const n=i+1;
    if(m.type==='line'){const r=scFactor?(m.px*scFactor).toFixed(4):'';rows.push([n,'length',r,scUnit,m.px.toFixed(2),Math.round(m.x1*ir),Math.round(m.y1*ir2),Math.round(m.x2*ir),Math.round(m.y2*ir2),'','','','','','','','','']);}
    else if(m.type==='diam'){const r=scFactor?(m.r*2*scFactor).toFixed(4):'';rows.push([n,'diameter',r,scUnit,(m.r*2).toFixed(2),Math.round(m.x1*ir),Math.round(m.y1*ir2),Math.round(m.x2*ir),Math.round(m.y2*ir2),Math.round(m.cx*ir),Math.round(m.cy*ir2),(m.r*ir).toFixed(2),'','','','','','']);}
    else if(m.type==='angle'){rows.push([n,'angle',m.deg.toFixed(4),'deg','','','','','','','','',Math.round(m.vx*ir),Math.round(m.vy*ir2),Math.round(m.ax*ir),Math.round(m.ay*ir2),Math.round(m.bx*ir),Math.round(m.by*ir2),'']);}
    else if(m.type==='area'){const r=scFactor?(m.areaPx*scFactor*scFactor).toFixed(4):'';const ps=m.pts.map(p=>`${Math.round(p.x*ir)};${Math.round(p.y*ir2)}`).join('|');rows.push([n,'area',r,`${scUnit}²`,m.areaPx.toFixed(2),'','','','','','','','','','','','','',ps]);}
  });
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.download='mesuro-measurements.csv'; a.href=URL.createObjectURL(blob); a.click(); URL.revokeObjectURL(a.href);
}

updUI();
setTimeout(() => { const ad = document.getElementById('adUnit'); if (ad) ad.style.display = 'block'; }, 400);
</script>
